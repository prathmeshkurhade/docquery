services:
  # ---- Your app (images you build + push to Docker Hub) ----

  fastapi:
    image: ${DOCKERHUB_USERNAME}/ragapp-backend:latest
    container_name: ragapp-fastapi
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.prod
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
      - qdrant

  celery:
    image: ${DOCKERHUB_USERNAME}/ragapp-backend:latest   # same image as fastapi
    container_name: ragapp-celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file: .env.prod
    volumes:
      - uploads_data:/app/uploads    # shares uploads with fastapi
    depends_on:
      - postgres
      - redis
      - qdrant

  nextjs:
    image: ${DOCKERHUB_USERNAME}/ragapp-frontend:latest
    container_name: ragapp-nextjs
    restart: unless-stopped

  # ---- Reverse proxy ----

  nginx:
    image: nginx:alpine
    container_name: ragapp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
      - nextjs

  # ---- Infrastructure (pre-built images from Docker Hub) ----

  postgres:
    image: postgres:16
    container_name: ragapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragapp-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: ragapp-redis
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
