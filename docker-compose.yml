services:
  # ---- PostgreSQL: stores users, documents metadata, chat history ----
  postgres:
    image: postgres:16
    container_name: ragapp-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"   # 5433 on host → 5432 inside container (avoids conflict with local PG)
    environment:
      POSTGRES_USER: ragapp
      POSTGRES_PASSWORD: ragapp123
      POSTGRES_DB: ragapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---- Qdrant: vector database for embeddings + semantic search ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragapp-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API + Dashboard
      - "6334:6334"   # gRPC (faster, used by qdrant-client in production)
    volumes:
      - qdrant_data:/qdrant/storage

  # ---- Redis: message broker for Celery task queue ----
  redis:
    image: redis:7-alpine
    container_name: ragapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

# Named volumes — Docker manages these, data survives container restarts
volumes:
  postgres_data:
  qdrant_data:
